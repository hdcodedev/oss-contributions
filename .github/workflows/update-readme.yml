name: Update README from Google Sheet

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sunday at 00:00 UTC

# Cancel in-progress runs for the same ref.
concurrency:
  group: update-readme-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.x'

      - name: Run generation script
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          python3 generate_readme.py

      - name: Show git diff
        run: |
          git status --porcelain
          git diff --stat

      - name: Validate generated artifacts
        run: |
          set -e
          test -s README.md || { echo "README.md is empty"; exit 1; }
          python3 -c "import json,sys; d=json.load(open('README_DATA.json')); sys.exit(1 if not d.get('years') else 0)" \
            || { echo "README_DATA.json is empty or invalid"; exit 1; }

      - name: Commit and push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md README_DATA.json
          if ! git diff --cached --quiet; then
            git commit -m "docs: update contributions artifacts"
            git push
          else
            echo "No changes to commit"
          fi
